# Declare your Buildkite pipelines below
---
# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: buildkite-pipeline-github-actions
  description: Buildkite Pipeline for github-actions
  links:
    - title: Pipeline
      url: https://buildkite.com/elastic/github-actions

spec:
  type: buildkite-pipeline
  owner: group:kibana-operations
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: github-actions
      description: 
    spec:
      repository: elastic/github-actions
      pipeline_file: ".buildkite/pipeline.yml"
      provider_settings:
        build_pull_request_forks: true
      teams:
        kibana-operations:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: READ_ONLY
