name: Update dist

on:
  push:
    branches:
      - master

concurrency:
  group: update-dist-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-dist:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build actions
        run: pnpm build

      - name: Commit updated dist output
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet; then
            echo "No dist updates to commit."
            exit 0
          fi

          SOURCE_SHA="$(git rev-parse --short=12 HEAD)"

          if git diff --name-only | grep -Ev '^[^/]+/dist/' >/dev/null; then
            echo "::error::Refusing to auto-commit changes outside action dist/ output." >&2
            git --no-pager diff --name-only >&2 || true
            exit 1
          fi

          git diff --name-only -z | xargs -0 git add --
          git commit -m "build: update dist for ${SOURCE_SHA}"
          git push origin HEAD:master
