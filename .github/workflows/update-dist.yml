name: Update dist

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - 'package.json'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: update-dist-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-dist:
    if: >-
      ${{
        github.actor != 'github-actions[bot]' &&
        (
          (
            github.event_name == 'push' &&
            github.event.repository.fork == false
          ) ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            startsWith(github.head_ref, 'release/') &&
            contains(fromJSON('["MEMBER"]'), github.event.pull_request.author_association)
          )
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'master' }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build actions
        run: pnpm build

      - name: Commit updated dist output
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
          HEAD_REF: ${{ github.head_ref || '' }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
        run: |
          read_package_version_from_ref() {
            git show "$1:package.json" | node --print "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version"
          }

          if [ "${EVENT_NAME}" = 'pull_request' ]; then
            git fetch origin "${BASE_REF}"

            VERSION="$(read_package_version_from_ref 'HEAD')"
            BASE_VERSION="$(read_package_version_from_ref "origin/${BASE_REF}")"

            if [ "${VERSION}" = "${BASE_VERSION}" ]; then
              echo "Pull request does not bump package.json version. Skipping dist update."
              exit 0
            fi
          fi

          if git diff --quiet; then
            echo "No dist updates to commit."
            exit 0
          fi

          SOURCE_SHA="$(git rev-parse --short=12 HEAD)"

          if git diff --name-only | grep -Ev '^[^/]+/dist/' >/dev/null; then
            echo "::error::Refusing to auto-commit changes outside action dist/ output." >&2
            git --no-pager diff --name-only >&2 || true
            exit 1
          fi

          git diff --name-only -z | xargs -0 git add --
          git commit -m "build: update dist for ${SOURCE_SHA}"

          if [ "${EVENT_NAME}" = 'pull_request' ]; then
            git push origin "HEAD:${HEAD_REF}"
          else
            git push origin HEAD:master
          fi
