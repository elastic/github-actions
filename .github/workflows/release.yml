name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver tag to release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.0
          cache: npm

      - name: Validate release input
        run: |
          VERSION='${{ inputs.version }}'

          if [ "${GITHUB_REF_NAME}" != 'master' ]; then
            echo 'Releases must be created from the master branch.'
            exit 1
          fi

          if ! printf '%s' "${VERSION}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo 'Version must use semver and start with v, for example v1.2.3.'
            exit 1
          fi

          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint source files
        run: npm run lint

      - name: Typecheck TypeScript
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build actions
        run: npm run build

      - name: Verify committed build output
        run: git diff --exit-code

      - name: Create and push release tags
        run: |
          VERSION='${{ inputs.version }}'
          MAJOR_TAG="${VERSION%%.*}"

          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "refs/tags/${VERSION}"

          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' tag -fa "${MAJOR_TAG}" -m "Release ${MAJOR_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${MAJOR_TAG}" --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ inputs.version }}' --verify-tag --generate-notes
